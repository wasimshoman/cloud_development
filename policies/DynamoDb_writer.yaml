{
    "Version": "2012-10-17",
    "Statement": [
        {
            "Sid": "AllowWriteAccessToOrdersTable",
            "Effect": "Allow",
            "Action": [
                "dynamodb:PutItem",
                "dynamodb:UpdateItem",
                "dynamodb:DeleteItem",
                "dynamodb:BatchWriteItem",
                "dynamodb:ConditionCheckItem"
            ],
            "Resource": "arn:aws:dynamodb:*:*:table/orders"
        }
    ]
}